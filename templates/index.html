<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack Flask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary border-bottom pb-2">HealthTrack Dashboard</h2>
        
        <div class="card my-4 shadow-sm">
            <div class="card-body">
                <h5 id="form-title">Input Laporan Baru</h5>
                <div class="row g-2">
                    <div class="col-md-3">
                        <input type="text" id="nama" class="form-control" placeholder="Nama" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="status" class="form-control" placeholder="Status" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="catatan" class="form-control" placeholder="Catatan (Opsional)">
                    </div>
                    <div class="col-md-2">
                        <button id="btn-simpan" onclick="kirimData()" class="btn btn-success w-100">Simpan</button>
                    </div>
                </div>
            </div>
        </div>

        <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-dark">
                <tr><th>Nama</th><th>Status</th><th>Catatan</th><th class="text-center">Aksi</th></tr>
            </thead>
            <tbody>
                {% for item in laporan %}
                <tr>
                    <td>{{ item.nama }}</td>
                    <td><span class="badge bg-info">{{ item.status }}</span></td>
                    <td>{{ item.catatan }}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning me-1" onclick="siapkanEdit('{{ item.id }}', '{{ item.nama }}', '{{ item.status }}', '{{ item.catatan }}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="hapusData('{{ item.id }}')">Hapus</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        // Variabel penanda apakah kita sedang nambah data baru atau ngedit data lama
        let editModeId = null;

        // Fungsi untuk melempar data dari tabel ke form input
        function siapkanEdit(id, nama, status, catatan) {
            editModeId = id;
            document.getElementById('nama').value = nama;
            document.getElementById('status').value = status;
            document.getElementById('catatan').value = catatan === "-" ? "" : catatan;
            
            // Ubah tampilan form agar user tahu ini mode edit
            document.getElementById('form-title').innerText = "Edit Laporan";
            document.getElementById('btn-simpan').innerText = "Update";
            document.getElementById('btn-simpan').classList.replace('btn-success', 'btn-warning');
        }

        // Fungsi untuk menghapus data
        async function hapusData(id) {
            if (!confirm("Yakin ingin menghapus laporan ini?")) return;

            const response = await fetch(`/api/lapor/${id}`, { method: 'DELETE' });

            if (response.ok) {
                alert("Data berhasil dihapus!");
                location.reload();
            }
        }

        // Fungsi untuk mengirim data (bisa POST untuk tambah, bisa PUT untuk update)
        async function kirimData() {
            const nilaiCatatan = document.getElementById('catatan').value || "-";

            const payload = {
                nama: document.getElementById('nama').value,
                status: document.getElementById('status').value,
                catatan: nilaiCatatan
            };

            if(!payload.nama || !payload.status) {
                alert("Nama dan Status wajib diisi ya!");
                return;
            }

            // Tentukan URL dan Method berdasarkan mode (Edit atau Tambah)
            const url = editModeId ? `/api/lapor/${editModeId}` : '/api/lapor';
            const method = editModeId ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert(editModeId ? "Data berhasil diupdate!" : "Mantap! Data masuk.");
                location.reload(); 
            }
        }
    </script>
</body>
</html>
