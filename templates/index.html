<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-primary border-bottom pb-2">HealthTrack Dashboard</h2>
        
        <div class="card my-4 shadow-sm">
            <div class="card-body">
                <h5 id="form-title">Input Laporan Baru</h5>
                <div class="row g-2">
                    <div class="col-md-2">
                        <input type="text" id="nama" class="form-control" placeholder="Nama" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" id="status" class="form-control" placeholder="Status" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="catatan" class="form-control" placeholder="Catatan">
                    </div>
                    <div class="col-md-3">
                        <input type="file" id="foto" class="form-control">
                        <small class="text-muted" id="foto-help">Kosongkan saat edit jika tidak ganti foto.</small>
                    </div>
                    <div class="col-md-2">
                        <button id="btn-simpan" onclick="kirimData()" class="btn btn-success w-100">Simpan</button>
                    </div>
                </div>
            </div>
        </div>

        <table class="table table-hover bg-white rounded shadow-sm">
            <thead class="table-dark">
                <tr><th>Nama</th><th>Status</th><th>Catatan</th><th>Foto</th><th class="text-center">Aksi</th></tr>
            </thead>
            <tbody>
                {% for item in laporan %}
                <tr>
                    <td>{{ item.nama }}</td>
                    <td><span class="badge bg-info">{{ item.status }}</span></td>
                    <td>{{ item.catatan }}</td>
                    <td>
                        {% if item.foto_url %}
                        <a href="{{ item.foto_url }}" target="_blank">
                            <img src="{{ item.foto_url }}" width="50" height="50" style="object-fit: cover;" class="rounded border">
                        </a>
                        {% else %}
                        <span class="text-muted">-</span>
                        {% endif %}
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning me-1" onclick="siapkanEdit('{{ item.id }}', '{{ item.nama }}', '{{ item.status }}', '{{ item.catatan }}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="hapusData('{{ item.id }}')">Hapus</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        let editModeId = null;

        function siapkanEdit(id, nama, status, catatan) {
            editModeId = id;
            document.getElementById('nama').value = nama;
            document.getElementById('status').value = status;
            document.getElementById('catatan').value = catatan === "-" ? "" : catatan;
            
            // Note: Input file (foto) tidak bisa diisi otomatis lewat JS demi keamanan browser.
            // Jadi dibiarkan kosong.

            document.getElementById('form-title').innerText = "Edit Laporan";
            document.getElementById('btn-simpan').innerText = "Update";
            document.getElementById('btn-simpan').classList.replace('btn-success', 'btn-warning');
        }

        async function hapusData(id) {
            if (!confirm("Yakin ingin menghapus laporan ini?")) return;

            const response = await fetch(`/api/lapor/${id}`, { method: 'DELETE' });

            if (response.ok) {
                alert("Data berhasil dihapus!");
                location.reload();
            }
        }

        async function kirimData() {
            // PENTING: Menggunakan FormData agar bisa kirim text + file gambar sekaligus
            const formData = new FormData();
            formData.append('nama', document.getElementById('nama').value);
            formData.append('status', document.getElementById('status').value);
            formData.append('catatan', document.getElementById('catatan').value || "-");

            const fotoFile = document.getElementById('foto').files[0];
            if (fotoFile) {
                formData.append('foto', fotoFile);
            }

            if(!formData.get('nama') || !formData.get('status')) {
                alert("Nama dan Status wajib diisi ya!");
                return;
            }

            const url = editModeId ? `/api/lapor/${editModeId}` : '/api/lapor';
            const method = editModeId ? 'PUT' : 'POST';

            // Tidak perlu set 'Content-Type' manual kalau pakai FormData
            const response = await fetch(url, {
                method: method,
                body: formData 
            });

            if (response.ok) {
                alert(editModeId ? "Data berhasil diupdate!" : "Mantap! Data & Foto masuk Cloud.");
                location.reload(); 
            } else {
                alert("Waduh, terjadi kesalahan saat mengirim data.");
            }
        }
    </script>
</body>
</html>
